<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css\style.css" />
    <title>Cadastro</title>
  </head>
  <body>
    <div class="container">
      <div class="cadastro">
        <h2>Cadastre-se Aqui!</h2>

        <form>
          <div class="campo">
            <label for="nome_completo">Nome Completo</label>

            <input
              type="text"
              id="nome_completo"
              name="nome_completo"
              placeholder="Nome"
              required
              autocomplete="name"
            />
          </div>

          <div class="campo">
            <label for="email">Endereço de Email</label>

            <input type="email" id="email" name="email" placeholder="Email" />
          </div>

          <div class="campo">
            <label for="senha">Senha</label>

            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Senha"
              required
              minlength="6"
            />
          </div>
          <div class="botao">
            <button type="submit">Cadastrar</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
